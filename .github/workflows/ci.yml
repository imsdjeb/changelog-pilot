name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Run tests
        run: bash tests/run-tests.sh

  validate-json:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Validate all JSON files
        run: |
          errors=0
          while IFS= read -r f; do
            if ! jq empty "$f" 2>/dev/null; then
              echo "INVALID: $f"
              errors=$((errors + 1))
            fi
          done < <(find . -name "*.json" -not -path "*/node_modules/*" -not -path "*/.git/*")
          if [ $errors -gt 0 ]; then
            echo "$errors invalid JSON file(s) found"
            exit 1
          fi
          echo "All JSON files valid"
